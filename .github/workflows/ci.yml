name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild \
            -project SynapseMeetings.xcodeproj \
            -scheme SynapseMeetings \
            -destination 'platform=macOS' \
            test
